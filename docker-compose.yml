services:
  redis:
    image: redis:alpine
    container_name: lumina-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  auth:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    container_name: lumina-auth
    restart: always
    env_file:
      - ./.env
    environment:
      - PORT=3000
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    ports:
      - '3001:3000'

  media:
    build:
      context: .
      dockerfile: apps/media/Dockerfile
    container_name: lumina-media
    restart: always
    env_file:
      - ./.env
    depends_on:
      - redis
    environment:
      - PORT=3000
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    ports:
      - '3002:3000'

  nginx:
    image: nginx:alpine
    container_name: lumina-gateway
    restart: always
    ports:
      - '8080:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth
      - media

volumes:
  redis_data:
