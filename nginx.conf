events {
    worker_connections 1024;
}

http {
    server_tokens off;

    server {
        listen 80;
        server_name localhost;

        # Route 1: Auth Service
        # Request: http://localhost:8080/api/auth/login
        # Proxies to: http://auth:3000/api/auth/login
        location /api/auth/ {
            proxy_pass http://auth:3000; 
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route 2: Media Service
        # Request: http://localhost:8080/api/media/avatar/url
        # Proxies to: http://media:3000/api/media/avatar/url
        location /api/media/ {
            proxy_pass http://media:3000;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            client_max_body_size 50M; 
        }
    }
}